    <title>Entre na sua conta BuyTicket</title>

  <body>
    <img src="/assets/mobile/background-mobile.svg" alt="background-mobile">
  <section>
    <main>
    <span class="logo-branca-transparente">
      <img src="/assets/mobile/Logo-Branca-Transparente.avif" alt="logo-branca-transparente" />
    </span>
    <img class="tipografia-roxo-transparente" src="/assets/mobile/Tipografia-Roxo-Transparente.avif"
      alt="tipografia-roxo-transparente" />
    

  </main>

    <h1>Fazer login</h1>

    <form>
      <i class="fa-duotone fa-solid fa-envelope"></i>
      <input type="email" name="email" id="user-email" placeholder="Seu email" />
      <input type="password" name="senha" id="user-password" placeholder="Sua senha" />
    </form>

    <div class="checkbox-area">

    <div class="checkbox-left">
    <input type="checkbox" name="lembrar" id="remember-user-btn" />

    <label for="remember-user-btn" id="remember-user">
      Lembrar de mim
    </label>
  </div>

  <a href="" rel="noopener noreferrer" id="forget-password">
    Esqueceu a senha?
  </a>

</div>

    <button id="login-btn">Entrar na conta</button>
    <ion-icon name="chevron-forward-outline"></ion-icon>
    <div class="creat-account-direct">
      <p>Ainda não tem uma conta?</p>
      <a href="" rel="noopener noreferrer">Cadastrar</a>
