<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />

    <title>Entre na sua conta BuyTicket</title>
  </head>
  <body>
    <div class="page-images">
      <img
        src="/assets/mobile/Logo-Branca-Transparente.avif"
        alt="logo-branca-transparente"
      />
      <img
        src="/assets/mobile/Tipografia-Roxo-Transparente.avif"
        alt="tipografia-roxo-transparente"
      />
    </div>
    <section>
      <h1>Fazer login</h1>
      <form>
        <input
          type="email"
          name="email"
          id="user-email"
          placeholder="Seu email"
        />
        <input
          type="password"
          name="senha"
          id="user-password"
          placeholder="Sua senha"
        />
        <input type="checkbox" name="lembrar" id="remember-user" />
        <label for="remember-user">Lembrar de mim</label>
        <a href="" rel="noopener noreferrer"
          >Esqueceu a senha?</a
        >
        <button>Entrar na conta</button>
        <ion-icon name="chevron-forward-outline"></ion-icon>
      </form>
    </section>
    <div class="creat-account-direct">
      <h5>Ainda não tem uma conta?</h2>
      <a href="" rel="noopener noreferrer">Cadastrar</a>
